name: ci

# NOTE: auto-triggers (push / pull_request) are intentionally disabled because
# GitHub Actions is currently unavailable on this account (billing). Re-enable the
# `push` / `pull_request` triggers below once Actions billing is active. Until then
# the reliability gate runs locally and reproducibly: `pytest -q` and `batayan eval`.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (offline engine has no runtime deps)
        run: pip install -e .[dev]
      - name: Run tests
        run: pytest -q
      - name: Reliability gate (eval must be 100% correct)
        run: batayan eval
